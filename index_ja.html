<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoLogic — アルゴリズムリファレンス</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    /* LIGHT MODE */
    --bg: #f9f9fb;
    --surface: #f0f0f5;
    --card: #ffffff;
    --border: #e2e2ec;
    --accent: #6b5aed;
    --accent-rgb: 107, 90, 237;
    --accent2: #ec5a8c;
    --accent2-rgb: 236, 90, 140;
    --accent3: #00bf99;
    --accent3-rgb: 0, 191, 153;
    --text: #2c2c35;
    --muted: #6b6b80;
    --highlight: #11111a;

    --header-bg: rgba(249, 249, 251, 0.85);

    --cat-tree: #d98c00;
    --cat-tree-rgb: 217, 140, 0;
    --cat-dynamic: #0088cc;
    --cat-dynamic-rgb: 0, 136, 204;
    --cat-greedy: #e64545;
    --cat-greedy-rgb: 230, 69, 69;

    --detail-text: #4a4a5e;

  --cat-datastructure: #9b51e0;
  --cat-datastructure-rgb: 155, 81, 224;
  }

  [data-theme="dark"] {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a38;
    --accent: #7c6bff;
    --accent-rgb: 124, 107, 255;
    --accent2: #ff6b9d;
    --accent2-rgb: 255, 107, 157;
    --accent3: #00d4aa;
    --accent3-rgb: 0, 212, 170;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --highlight: #f5f5ff;

    --header-bg: rgba(10, 10, 15, 0.85);

    --cat-tree: #ffb447;
    --cat-tree-rgb: 255, 178, 71;
    --cat-dynamic: #64d2ff;
    --cat-dynamic-rgb: 100, 210, 255;
    --cat-greedy: #ff9f9f;
    --cat-greedy-rgb: 255, 107, 107;

    --detail-text: #b0b0c0;

  --cat-datastructure: #b57eed;
  --cat-datastructure-rgb: 181, 126, 237;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ─── GLOW ORBS ─── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(var(--accent-rgb), 0.15); top: -200px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(var(--accent2-rgb), 0.1); bottom: -100px; right: -100px; }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    padding: 0 48px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    background: var(--header-bg);
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .nav-pills {
    display: flex;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .nav-pill {
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: 'Inter', sans-serif;
  }
  .nav-pill:hover { color: var(--text); }
  .nav-pill.active { background: var(--accent); color: white; }

  /* ─── MAIN CONTAINER ─── */
  main {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 48px 80px;
  }

  /* ─── HOME VIEW ─── */
  #home-view { display: block; }
  #detail-view { display: none; }

  .hero {
    padding: 64px 0 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .hero-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero-tag::before { content: ''; width: 24px; height: 1px; background: var(--accent); }

  h1 {
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--highlight);
  }
  h1 em {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .hero-sub {
    margin-top: 16px;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 400;
    max-width: 480px;
    line-height: 1.6;
  }

  .stats-block {
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: right;
  }
  .stat-num {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--highlight);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ─── FILTERS ─── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ─── TABLE ─── */
  .table-wrapper {
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--card);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 24px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
    animation: rowFadeIn 0.4s ease both;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(var(--accent-rgb), 0.06); }

  @keyframes rowFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  td { padding: 18px 24px; vertical-align: middle; }

  .algo-name {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--highlight);
    letter-spacing: -0.02em;
  }
  .algo-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .category-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .explanation {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    max-width: 280px;
  }

  .usecase {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    max-width: 220px;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  .complexity-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 6px;
    background: rgba(var(--accent3-rgb), 0.08);
    color: var(--accent3);
    border: 1px solid rgba(var(--accent3-rgb), 0.2);
    white-space: nowrap;
  }

  .arrow-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 0.9rem;
  }
  tr:hover .arrow-btn {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(var(--accent-rgb), 0.1);
  }

  /* ─── CATEGORY COLORS ─── */
  .cat-search { background: rgba(var(--accent-rgb), 0.12); color: var(--accent); }
  .cat-sort { background: rgba(var(--accent2-rgb), 0.12); color: var(--accent2); }
  .cat-graph { background: rgba(var(--accent3-rgb), 0.12); color: var(--accent3); }
  .cat-tree { background: rgba(var(--cat-tree-rgb), 0.12); color: var(--cat-tree); }
  .cat-dynamic { background: rgba(var(--cat-dynamic-rgb), 0.12); color: var(--cat-dynamic); }
  .cat-greedy { background: rgba(var(--cat-greedy-rgb), 0.12); color: var(--cat-greedy); }
  .cat-datastructure { background: rgba(var(--cat-datastructure-rgb), 0.12); color: var(--cat-datastructure); }

  .icon-search { background: rgba(var(--accent-rgb), 0.15); }
  .icon-sort { background: rgba(var(--accent2-rgb), 0.15); }
  .icon-graph { background: rgba(var(--accent3-rgb), 0.15); }
  .icon-tree { background: rgba(var(--cat-tree-rgb), 0.15); }
  .icon-dynamic { background: rgba(var(--cat-dynamic-rgb), 0.15); }
  .icon-greedy { background: rgba(var(--cat-greedy-rgb), 0.15); }
  .icon-datastructure { background: rgba(var(--cat-datastructure-rgb), 0.15); }

  /* ─── DETAIL VIEW ─── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    margin: 32px 0 0;
    transition: color 0.2s;
    letter-spacing: 0.04em;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { transition: transform 0.2s; }
  .back-btn:hover svg { transform: translateX(-3px); }

  .detail-hero {
    padding: 32px 0 40px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .detail-category { margin-bottom: 16px; }

  .detail-title {
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--highlight);
    line-height: 1.05;
  }

  .detail-subtitle {
    margin-top: 12px;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--muted);
    line-height: 1.6;
    max-width: 560px;
  }

  .complexity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .complexity-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
  }
  .complexity-card .label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .complexity-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent3);
  }
  .complexity-card.space .value { color: var(--accent); }

  /* ─── BEGINNER EXPLAINER ─── */
  .explain-section {
    margin-bottom: 32px;
  }

  .explain-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
  }

  .explain-card.simple {
    grid-column: 1 / -1;
    border-left: 4px solid var(--accent);
    background: linear-gradient(135deg, rgba(var(--accent-rgb),0.05) 0%, var(--card) 60%);
  }

  .explain-card.analogy {
    border-left: 4px solid var(--accent3);
    background: linear-gradient(135deg, rgba(var(--accent3-rgb),0.05) 0%, var(--card) 60%);
  }

  .explain-card.reallife {
    border-left: 4px solid var(--accent2);
    background: linear-gradient(135deg, rgba(var(--accent2-rgb),0.05) 0%, var(--card) 60%);
  }

  .explain-card-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .explain-card.simple .explain-card-label { color: var(--accent); }
  .explain-card.analogy .explain-card-label { color: var(--accent3); }
  .explain-card.reallife .explain-card-label { color: var(--accent2); }

  .explain-card-label::before {
    content: '';
    width: 3px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .explain-card.simple .explain-card-label::before { background: var(--accent); }
  .explain-card.analogy .explain-card-label::before { background: var(--accent3); }
  .explain-card.reallife .explain-card-label::before { background: var(--accent2); }

  .explain-card p {
    font-size: 0.92rem;
    line-height: 1.75;
    color: var(--detail-text);
  }

  /* ─── INFO GRID (2-col: how it works + pros/cons) ─── */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  /* ─── IN DEPTH ─── */
  .indepth-section {
    margin-bottom: 32px;
  }

  .indepth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
  }

  .indepth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .indepth-card h3 {
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .indepth-card h3::before {
    content: '';
    width: 3px;
    height: 14px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 2px;
  }

  .indepth-paragraphs {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .indepth-paragraphs p {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--detail-text);
    padding-left: 16px;
    border-left: 2px solid var(--border);
    transition: border-color 0.2s;
  }

  .indepth-paragraphs p:hover {
    border-left-color: var(--accent);
  }

  @media (max-width: 768px) {
    .explain-top { grid-template-columns: 1fr; }
    .explain-card.simple { grid-column: 1; }
    .detail-grid { grid-template-columns: 1fr; }
  }

  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .detail-card h3 {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-card h3::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .detail-card p {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--detail-text);
  }

  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .steps-list li {
    display: flex;
    gap: 14px;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--detail-text);
    align-items: flex-start;
  }
  .step-num {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ─── CODE BLOCK ─── */
  .code-section {
    margin-bottom: 32px;
  }

  .code-section h3 {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .code-section h3::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent2);
    border-radius: 2px;
  }

  .code-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px 12px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .code-tab {
    padding: 6px 16px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .code-tab:hover { color: var(--text); }
  .code-tab.active { background: var(--accent2); color: white; }

  .code-block {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 0 12px 12px 12px;
    padding: 28px;
    overflow-x: auto;
    position: relative;
  }
  .code-block pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #c8c8e0;
    white-space: pre;
  }

  /* Syntax highlighting */
  .kw { color: #c792ea; font-weight: 500; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .cm { color: #546e7a; font-style: italic; }
  .var { color: #eefff5; }
  .op { color: #89ddff; }
  .ret { color: #ff6b9d; }

  /* ─── VISUALIZATION ─── */
  .viz-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .viz-section h3 {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .viz-section h3::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent3);
    border-radius: 2px;
  }

  .viz-array {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: flex-end;
    min-height: 120px;

<span class="cm"># Example</span>

function renderTable(filter = 'All', search = '') {
  const tbody = document.getElementById('algo-table-body');
  const filtered = algorithms.filter(a => {
    const matchCat = filter === 'All' || a.category === filter;
    const q = search.toLowerCase();
    const matchSearch = !q || a.name.toLowerCase().includes(q) ||
      a.category.toLowerCase().includes(q) || a.explanation.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  document.getElementById('algo-count').textContent = filtered.length;

  tbody.innerHTML = filtered.map((a, i) => {
    const m = catMeta[a.category] || catMeta['Search'];
    return `<tr onclick="showDetail('${a.id}')" style="animation-delay:${i * 40}ms">
      <td><div class="algo-name">
        <div class="algo-icon ${m.iconCls}">${m.icon}</div>
        ${a.name}
      </div></td>
      <td><span class="category-badge ${m.cls}">${a.category}</span></td>
      <td><div class="explanation">${a.explanation}</div></td>
      <td><div class="usecase">${a.usecase}</div></td>
      <td><span class="complexity-badge">${a.complexity.avg}</span></td>
      <td><button class="arrow-btn">→</button></td>
    </tr>`;
  }).join('');
}

function filterByCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll('.nav-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === cat || (cat === 'All' && b.textContent === 'All') || (cat === 'Dynamic Programming' && b.textContent === 'DP'));
  });
  renderTable(currentFilter, document.getElementById('search-input').value);
}

function filterByCategoryBtn(btn, cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(currentFilter, document.getElementById('search-input').value);
}

function filterTable() {
  renderTable(currentFilter, document.getElementById('search-input').value);
}

  const a = currentAlgo;
  const m = catMeta[a.category] || catMeta['Search'];

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-view').classList.add('fade-in');

  // Category badge
  document.getElementById('d-category').innerHTML = `<span class="category-badge ${m.cls}">${m.icon} ${a.category}</span>`;
  document.getElementById('d-title').textContent = a.name;
  document.getElementById('d-subtitle').textContent = a.subtitle;

  // Complexity cards
  document.getElementById('d-complexity').innerHTML = `

  // Beginner Explainer — Simple + Analogy + Real Life

      <div class="explain-card analogy">
        <div class="explain-card-label">🔗 例え話</div>

      </div>
      <div class="explain-card reallife">
        <div class="explain-card-label">🌍 実際の利用例</div>
        <p>${a.realLife || a.usecase}</p>
      </div>
    </div>
  `;

  // In Depth — multi-paragraph technical breakdown
  const inDepthParas = (a.inDepth || '').split('\n\n').filter(Boolean);
  document.getElementById('d-indepth-section').innerHTML = inDepthParas.length ? `
    <div class="indepth-card">
      <h3>詳細解説</h3>
      <div class="indepth-paragraphs">
        ${inDepthParas.map(p => `<p>${p}</p>`).join('')}
      </div>
    </div>
  ` : '';

  // Viz section
  const vizSection = document.getElementById('d-viz-section');
  if (a.viz) {
    vizSection.style.display = 'block';
    resetViz();
  } else {
    vizSection.style.display = 'none';
  }

  // Code tabs
  currentLang = 'Python';
  const langs = Object.keys(a.code);
  document.getElementById('code-tabs').innerHTML = langs.map(l =>
    `<button class="code-tab ${l === currentLang ? 'active' : ''}" onclick="setLang('${l}', this)">${l}</button>`
  ).join('');

  // Similar
  document.getElementById('d-footer').innerHTML = `

      <div class="similar-label">関連アルゴリズム</div>

        ${a.similar.map(s => {

      <div class="similar-label">計算量</div>
      <span class="complexity-badge" style="font-size:0.85rem">${a.complexity.avg}</span>
    </div>

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildGraphSVG(nodes, edges, visited=[], current='', queue=[], weights=false, dist={}) {
  const W = 560, H = 380;
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:560px;height:auto;display:block;margin:0 auto">`;
  // edges
  for (const e of edges) {
    const [a, b, w] = e;
    const n1 = nodes[a], n2 = nodes[b];
    const isActive = (visited.includes(a) && visited.includes(b));
    svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}"
      stroke="${isActive ? 'var(--accent3)' : 'var(--border)'}" stroke-width="${isActive?2.5:1.5}" opacity="0.8"/>`;
    if (weights && w !== undefined) {
      const mx = (n1.x+n2.x)/2, my = (n1.y+n2.y)/2;
      svg += `<rect x="${mx-10}" y="${my-9}" width="20" height="16" rx="3" fill="var(--card)"/>
        <text x="${mx}" y="${my+3}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="var(--muted)">${w}</text>`;
    }
  }
  // nodes
  for (const [id, pos] of Object.entries(nodes)) {
    const isCurrent = id === current;
    const isVisited = visited.includes(id);
    const isQueued  = queue.includes(id);
    const fill = isCurrent ? 'var(--accent2)' : isVisited ? 'var(--accent3)' : isQueued ? 'var(--accent)' : 'var(--surface)';
    const stroke = isCurrent ? 'var(--accent2)' : isVisited ? 'var(--accent3)' : 'var(--border)';
    svg += `<circle cx="${pos.x}" cy="${pos.y}" r="22" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
      <text x="${pos.x}" y="${pos.y+5}" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="${isVisited||isCurrent ? 'white' : 'var(--text)'}">${id}</text>`;
    if (weights && dist[id] !== undefined) {
      const d = dist[id] === Infinity ? '∞' : dist[id];
      svg += `<text x="${pos.x}" y="${pos.y+36}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="var(--accent)">${d}</text>`;
    }
  }
  svg += `</svg>`;
  return svg;
}

// ── BFS steps ───────────────────────────
function buildBFSSteps() {
  const steps = [];
  const visited = [], queue = ['A'];
  steps.push({ visited: [], current: '', queue: ['A'], status: 'Start: enqueue A' });
  const adj = { A:['B','C'], B:['D','E'], C:['F','G'], D:[], E:[], F:[], G:[] };
  while (queue.length) {
    const node = queue.shift();
    visited.push(node);
    steps.push({ visited: [...visited], current: node, queue: [...queue], status: `Visit ${node}, explore neighbors` });
    for (const nb of adj[node]) {
      if (!visited.includes(nb) && !queue.includes(nb)) {
        queue.push(nb);
        steps.push({ visited: [...visited], current: node, queue: [...queue], status: `Enqueue neighbor ${nb}` });
      }
    }
  }
  steps.push({ visited: [...visited], current: '', queue: [], status: '✓ BFS complete! All nodes visited layer by layer.' });
  return steps;
}

// ── DFS steps ───────────────────────────
function buildDFSSteps() {
  const steps = [];
  const visited = [], stack = ['A'];
  const adj = { A:['B','C'], B:['D','E'], C:['F','G'], D:[], E:[], F:[], G:[] };
  steps.push({ visited: [], current: '', stack: ['A'], status: 'Start: push A onto stack' });
  function dfs(node) {
    if (visited.includes(node)) return;
    visited.push(node);
    steps.push({ visited: [...visited], current: node, stack: [], status: `Visit ${node}, explore deep first` });
    for (const nb of adj[node]) {
      if (!visited.includes(nb)) {
        steps.push({ visited: [...visited], current: node, stack: [nb], status: `Go deeper → ${nb}` });
        dfs(nb);
      }
    }
    steps.push({ visited: [...visited], current: node, stack: [], status: `Backtrack from ${node}` });
  }
  dfs('A');
  steps.push({ visited: [...visited], current: '', stack: [], status: '✓ DFS complete! Explored all branches depth-first.' });
  return steps;
}

// ── Dijkstra steps ──────────────────────
function buildDijkstraSteps() {
  const steps = [];
  const nodes = DIJKSTRA_NODES;
  const edges = DIJKSTRA_EDGES;
  const adj = {};
  for (const id of Object.keys(nodes)) adj[id] = [];
  for (const [a,b,w] of edges) { adj[a].push([b,w]); adj[b].push([a,w]); }
  const dist = {};
  for (const id of Object.keys(nodes)) dist[id] = Infinity;
  dist['S'] = 0;
  const visited = [], queue = Object.keys(nodes);
  steps.push({ visited: [], current: '', dist: {...dist}, status: 'Initialize: dist[S]=0, all others=∞' });
  while (queue.length) {
    queue.sort((a,b) => dist[a]-dist[b]);
    const u = queue.shift();
    if (dist[u] === Infinity) break;
    visited.push(u);
    steps.push({ visited: [...visited], current: u, dist: {...dist}, status: `Pick closest unvisited: ${u} (dist=${dist[u]})` });
    for (const [v,w] of adj[u]) {
      if (dist[u]+w < dist[v]) {
        dist[v] = dist[u]+w;
        steps.push({ visited: [...visited], current: u, dist: {...dist}, status: `Update dist[${v}] = ${dist[v]} via ${u}` });
      }
    }
  }
  steps.push({ visited: [...visited], current: '', dist: {...dist}, status: '✓ Shortest paths from S found!' });
  return steps;
}

// ── Fibonacci DP ─────────────────────────
function buildFibSteps(n=10) {
  const steps = [];
  const dp = new Array(n+1).fill(null);
  dp[0]=0; dp[1]=1;
  steps.push({ dp:[...dp], cur:0, status:'Initialize dp[0]=0, dp[1]=1' });
  for (let i=2; i<=n; i++) {
    dp[i] = dp[i-1]+dp[i-2];
    steps.push({ dp:[...dp], cur:i, status:`dp[${i}] = dp[${i-1}](${dp[i-1]}) + dp[${i-2}](${dp[i-2]}) = ${dp[i]}` });
  }
  steps.push({ dp:[...dp], cur:-1, status:`✓ Fibonacci(${n}) = ${dp[n]}` });
  return steps;
}

// ── Knapsack DP ──────────────────────────
const KS_ITEMS = [{name:'Gem',w:2,v:6},{name:'Ring',w:2,v:10},{name:'Book',w:3,v:12},{name:'Vase',w:5,v:15}];
const KS_CAP = 7;
function buildKnapsackSteps() {
  const items = KS_ITEMS, W = KS_CAP, n = items.length;
  const dp = Array.from({length:n+1},()=>new Array(W+1).fill(0));
  const steps = [{ dp:dp.map(r=>[...r]), i:0, w:0, status:'Initialize dp table with all zeros' }];
  for (let i=1;i<=n;i++) {
    for (let w=0;w<=W;w++) {
      if (items[i-1].w > w) {
        dp[i][w] = dp[i-1][w];
        steps.push({ dp:dp.map(r=>[...r]), i, w, status:`Item ${i} (${items[i-1].name}) weight ${items[i-1].w} > ${w}, skip → dp[${i}][${w}]=${dp[i][w]}` });
      } else {
        const take = dp[i-1][w-items[i-1].w]+items[i-1].v;
        const skip = dp[i-1][w];
        dp[i][w] = Math.max(skip, take);
        steps.push({ dp:dp.map(r=>[...r]), i, w, status:`Item ${i} (${items[i-1].name}): take=${take}, skip=${skip} → dp[${i}][${w}]=${dp[i][w]}` });
      }
    }
  }
  steps.push({ dp:dp.map(r=>[...r]), i:-1, w:-1, status:`✓ Max value = ${dp[n][W]} with capacity ${W}` });
  return steps;
}

// ── BST ──────────────────────────────────
const BST_INSERT_SEQ = [8,3,10,1,6,14,4,7];
function buildBSTSteps() {
  const steps = [];
  const nodes = [], edges = [];
  function getPos(val, nodes) {
    // Simple positional layout
    let node = nodes.find(n=>n.val===val);
    return node ? {x:node.x, y:node.y} : null;
  }
  function insertNode(val, nodes, edges) {
    const W=560, startX=280, startY=50, dy=70;
    if (nodes.length===0) { nodes.push({val,x:startX,y:startY}); return; }
    let cur = nodes[0], parentX=startX, direction=0, depth=1;
    while (true) {
      if (val < cur.val) {
        const next = nodes.find(n=>n===edges.find(e=>e.parent===cur&&e.dir==='L')?.child);
        const childEdge = edges.find(e=>e.parent===cur&&e.dir==='L');
        if (childEdge) { cur=childEdge.child; depth++; }
        else {
          const x = cur.x - Math.max(20, 130/Math.pow(1.8,depth-1));
          const y = cur.y + dy;
          const newNode = {val,x:Math.max(20,Math.min(W-20,x)),y};
          nodes.push(newNode);
          edges.push({parent:cur,child:newNode,dir:'L'});
          return;
        }
      } else {
        const childEdge = edges.find(e=>e.parent===cur&&e.dir==='R');
        if (childEdge) { cur=childEdge.child; depth++; }
        else {
          const x = cur.x + Math.max(20, 130/Math.pow(1.8,depth-1));
          const y = cur.y + dy;
          const newNode = {val,x:Math.max(20,Math.min(W-20,x)),y};
          nodes.push(newNode);
          edges.push({parent:cur,child:newNode,dir:'R'});
          return;
        }
      }
    }
  }
  steps.push({ nodes:[], edges:[], highlight:-1, status:'Empty BST. Start inserting values...' });
  for (const val of BST_INSERT_SEQ) {
    insertNode(val, nodes, edges);
    steps.push({ nodes:JSON.parse(JSON.stringify(nodes)), edges:JSON.parse(JSON.stringify(edges)), highlight:val, status:`Insert ${val}: placed in correct BST position` });
  }
  // search step
  steps.push({ nodes:JSON.parse(JSON.stringify(nodes)), edges:JSON.parse(JSON.stringify(edges)), highlight:6, search:6, status:'Search for 6: start at root 8 → go left → 3 → go right → ✓ Found 6!' });
  return steps;
}

// ── Hash Table ───────────────────────────
const HT_OPS = [
  {op:'set',key:'alice',val:42},{op:'set',key:'bob',val:17},
  {op:'set',key:'carol',val:88},{op:'get',key:'bob',val:17},
  {op:'set',key:'dave',val:5},{op:'get',key:'alice',val:42},
  {op:'delete',key:'bob',val:null}
];
function simpleHash(key, size=8) {
  let h=0;
  for (const c of key) h=(h*31+c.charCodeAt(0))%size;
  return h;
}
function buildHashTableSteps() {
  const SIZE=8;
  const steps=[];
  const buckets=Array.from({length:SIZE},()=>[]);
  steps.push({ buckets:buckets.map(b=>[...b]), active:-1, op:null, status:'Empty Hash Table — 8 buckets, collision via chaining' });
  for (const {op,key,val} of HT_OPS) {
    const h = simpleHash(key, SIZE);
    if (op==='set') {
      steps.push({ buckets:buckets.map(b=>[...b]), active:h, op:'set', key, val, status:`set("${key}", ${val}) → hash=${h}` });
      const existing = buckets[h].findIndex(p=>p[0]===key);
      if (existing>=0) buckets[h][existing][1]=val;
      else buckets[h].push([key,val]);
      steps.push({ buckets:buckets.map(b=>b.map(p=>[...p])), active:h, op:'set', key, val, status:`✓ Stored "${key}"=${val} in bucket ${h}` });
    } else if (op==='get') {
      steps.push({ buckets:buckets.map(b=>b.map(p=>[...p])), active:h, op:'get', key, val, status:`get("${key}") → hash=${h} → found ${val}` });
    } else if (op==='delete') {
      steps.push({ buckets:buckets.map(b=>b.map(p=>[...p])), active:h, op:'delete', key, status:`delete("${key}") → hash=${h}` });
      const idx = buckets[h].findIndex(p=>p[0]===key);
      if (idx>=0) buckets[h].splice(idx,1);
      steps.push({ buckets:buckets.map(b=>b.map(p=>[...p])), active:h, op:'delete', key, status:`✓ Removed "${key}" from bucket ${h}` });
    }
  }
  return steps;
}

function renderHashTableViz(step) {
  const { buckets, active, op, key } = step;
  const W=560, cellH=34, offX=90, offY=10, bucketW=440;
  const H = offY + buckets.length*cellH + 20;
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;display:block;margin:0 auto;font-family:JetBrains Mono,monospace">`;
  buckets.forEach((bucket, i) => {
    const y = offY + i*cellH;
    const isActive = i === active;
    const fill = isActive ? (op==='get'?'rgba(0,212,170,0.15)':op==='delete'?'rgba(255,107,157,0.15)':'rgba(124,107,255,0.15)') : 'var(--surface)';
    const stroke = isActive ? (op==='get'?'var(--accent3)':op==='delete'?'var(--accent2)':'var(--accent)') : 'var(--border)';
    svg += `<rect x="${offX}" y="${y+1}" width="${bucketW}" height="${cellH-2}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="${isActive?2:1}"/>`;
    svg += `<text x="${offX-8}" y="${y+cellH/2+4}" text-anchor="end" font-size="11" fill="var(--muted)">[${i}]</text>`;
    if (bucket.length === 0) {
      svg += `<text x="${offX+12}" y="${y+cellH/2+4}" font-size="11" fill="var(--muted)" opacity="0.5">empty</text>`;
    } else {
      let cx = offX + 10;
      for (const [k,v] of bucket) {
        const isKey = k === key && isActive;
        const label = `"${k}": ${v}`;
        const bw = label.length*7+16;
        svg += `<rect x="${cx}" y="${y+5}" width="${bw}" height="${cellH-10}" rx="3" fill="${isKey?'var(--accent)':'var(--card)'}" stroke="${isKey?'var(--accent)':'var(--border)'}"/>`;
        svg += `<text x="${cx+bw/2}" y="${y+cellH/2+4}" text-anchor="middle" font-size="10" fill="${isKey?'white':'var(--text)'}">${label}</text>`;
        cx += bw + 6;
        if (cx < offX+bucketW-10) { svg += `<text x="${cx+2}" y="${y+cellH/2+4}" font-size="14" fill="var(--muted)">→</text>`; cx += 18; }
      }
    }
  });
  svg += '</svg>';
  document.getElementById('viz-array').innerHTML = svg;
}

// ── A* Search ────────────────────────────
function buildAStarSteps() {
  // 5x5 grid, S=(0,2), G=(4,2), wall at col 2 rows 0-3
  const ROWS=5, COLS=5, START='0,2', GOAL='4,2';
  const walls = new Set(['2,0','2,1','2,2','2,3']);
  function h(node) {
    const [r,c] = node.split(',').map(Number);
    const [gr,gc] = GOAL.split(',').map(Number);
    return Math.abs(r-gr)+Math.abs(c-gc);
  }
  function neighbors(node) {
    const [r,c] = node.split(',').map(Number);
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]
      .filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!walls.has(`${nr},${nc}`))
      .map(([nr,nc])=>`${nr},${nc}`);
  }
  const steps = [];
  const openSet = new Set([START]);
  const gScore = {[START]:0};
  const fScore = {[START]:h(START)};
  const cameFrom = {};
  const closed = new Set();
  steps.push({ open:[START], closed:[], current:'', path:[], status:`Start A*: S at (0,2), Goal at (4,2). Wall blocks center column.` });
  let iter = 0;
  while (openSet.size && iter++ < 30) {
    const current = [...openSet].sort((a,b)=>(fScore[a]||99)-(fScore[b]||99))[0];
    if (current === GOAL) {
      const path = [];
      let n = current;
      while (n) { path.unshift(n); n=cameFrom[n]; }
      steps.push({ open:[...openSet], closed:[...closed], current, path, status:`✓ Goal reached! Path length = ${path.length-1} steps` });
      break;
    }
    openSet.delete(current);
    closed.add(current);
    steps.push({ open:[...openSet], closed:[...closed], current, path:[], status:`Explore (${current}): g=${gScore[current]}, f=${fScore[current]||'?'}` });
    for (const nb of neighbors(current)) {
      if (closed.has(nb)) continue;
      const tentG = (gScore[current]||0)+1;
      if (tentG < (gScore[nb]||Infinity)) {
        cameFrom[nb] = current;
        gScore[nb] = tentG;
        fScore[nb] = tentG + h(nb);
        openSet.add(nb);
        steps.push({ open:[...openSet], closed:[...closed], current, path:[], status:`Add neighbor (${nb}): g=${tentG}, h=${h(nb)}, f=${fScore[nb]}` });
      }
    }
  }
  return steps;
}

function renderAStarViz(step) {
  const { open, closed, current, path } = step;
  const ROWS=5, COLS=5, CELL=64, PAD=20;
  const walls = new Set(['2,0','2,1','2,2','2,3']);
  const W = PAD*2+COLS*CELL, H = PAD*2+ROWS*CELL+30;
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;display:block;margin:0 auto;font-family:JetBrains Mono,monospace">`;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const id = `${r},${c}`;
    const x = PAD+c*CELL, y = PAD+r*CELL;
    const isWall = walls.has(id);
    const isStart = id==='0,2', isGoal = id==='4,2';
    const isCurrent = id===current;
    const isPath = path.includes(id);
    const isOpen = open.includes(id);
    const isClosed = closed.includes(id);
    let fill = 'var(--surface)';
    if (isWall) fill = 'var(--border)';
    else if (isPath) fill = 'var(--accent3)';
    else if (isCurrent) fill = 'var(--accent2)';
    else if (isOpen) fill = 'rgba(124,107,255,0.3)';
    else if (isClosed) fill = 'rgba(0,212,170,0.15)';
    svg += `<rect x="${x+1}" y="${y+1}" width="${CELL-2}" height="${CELL-2}" rx="5" fill="${fill}" stroke="${isCurrent||isPath?'none':'var(--border)'}" stroke-width="1"/>`;
    if (isStart) svg += `<text x="${x+CELL/2}" y="${y+CELL/2+5}" text-anchor="middle" font-size="14" font-weight="700" fill="white">S</text>`;
    else if (isGoal) svg += `<text x="${x+CELL/2}" y="${y+CELL/2+5}" text-anchor="middle" font-size="14" font-weight="700" fill="white">G</text>`;
    else if (!isWall) {
      svg += `<text x="${x+CELL/2}" y="${y+CELL/2+4}" text-anchor="middle" font-size="10" fill="var(--muted)" opacity="0.6">${r},${c}</text>`;
    }
  }
  // legend
  const leg = [['var(--accent2)','Current'],['rgba(124,107,255,0.3)','Open'],['rgba(0,212,170,0.15)','Closed'],['var(--accent3)','Path']];
  let lx = PAD;
  for (const [fill, label] of leg) {
    svg += `<rect x="${lx}" y="${H-22}" width="12" height="12" rx="2" fill="${fill}"/>`;
    svg += `<text x="${lx+16}" y="${H-12}" font-size="10" fill="var(--muted)">${label}</text>`;
    lx += label.length*6+26;
  }
  svg += '</svg>';
  document.getElementById('viz-array').innerHTML = svg;
}

// ── LRU Cache ────────────────────────────
function buildLRUSteps() {
  const CAP = 4;
  const ops = [
    {op:'put',key:1,val:'A'},{op:'put',key:2,val:'B'},{op:'put',key:3,val:'C'},
    {op:'get',key:1},{op:'put',key:4,val:'D'},{op:'put',key:5,val:'E'},
    {op:'get',key:3},{op:'put',key:6,val:'F'}
  ];
  const steps = [];
  const cache = []; // [{key,val}] head=MRU, tail=LRU
  steps.push({ cache:[], cap:CAP, op:null, status:`Empty LRU Cache (capacity=${CAP}). MRU at left, LRU at right.` });
  for (const {op,key,val} of ops) {
    if (op==='put') {
      const idx = cache.findIndex(e=>e.key===key);
      if (idx>=0) cache.splice(idx,1);
      cache.unshift({key,val});
      if (cache.length>CAP) {
        const evicted = cache.pop();
        steps.push({ cache:[...cache.map(e=>({...e}))], cap:CAP, op:'evict', key, val, evicted:evicted.key, status:`put(${key},"${val}") → evict LRU key=${evicted.key}, add to front` });
      } else {
        steps.push({ cache:[...cache.map(e=>({...e}))], cap:CAP, op:'put', key, val, status:`put(${key},"${val}") → add to front (MRU)` });
      }
    } else {
      const idx = cache.findIndex(e=>e.key===key);
      if (idx>=0) {
        const entry = cache.splice(idx,1)[0];
        cache.unshift(entry);
        steps.push({ cache:[...cache.map(e=>({...e}))], cap:CAP, op:'get', key, found:true, status:`get(${key}) → hit! Move key=${key} to front (MRU)` });
      } else {
        steps.push({ cache:[...cache.map(e=>({...e}))], cap:CAP, op:'get', key, found:false, status:`get(${key}) → miss! Key not in cache.` });
      }
    }
  }
  return steps;
}

function renderLRUViz(step) {
  const { cache, cap, op, key, evicted } = step;
  const W=560, cellW=100, cellH=60, gap=8, offX=30, offY=60;
  const H = offY+cellH+80;
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;display:block;margin:0 auto;font-family:Inter,sans-serif">`;
  // labels
  svg += `<text x="${offX}" y="25" font-size="11" font-weight="700" fill="var(--accent3)">◀ MRU (Most Recent)</text>`;
  svg += `<text x="${W-offX}" y="25" text-anchor="end" font-size="11" font-weight="700" fill="var(--accent2)">LRU (Least Recent) ▶</text>`;
  // empty slots
  for (let i=0;i<cap;i++) {
    const x = offX + i*(cellW+gap);
    svg += `<rect x="${x}" y="${offY}" width="${cellW}" height="${cellH}" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,2"/>`;
  }
  // filled entries
  cache.forEach((e,i) => {
    const x = offX + i*(cellW+gap);
    const isActive = e.key===key;
    const isEvict = evicted===e.key;
    const isMRU = i===0;
    const fill = isActive&&op==='get' ? 'var(--accent3)' : isActive ? 'var(--accent)' : isMRU&&op==='put' ? 'rgba(124,107,255,0.3)' : 'var(--card)';
    const stroke = isActive ? (op==='get'?'var(--accent3)':'var(--accent)') : 'var(--border)';
    svg += `<rect x="${x}" y="${offY}" width="${cellW}" height="${cellH}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
    svg += `<text x="${x+cellW/2}" y="${offY+22}" text-anchor="middle" font-size="10" fill="var(--muted)">key=${e.key}</text>`;
    svg += `<text x="${x+cellW/2}" y="${offY+42}" text-anchor="middle" font-size="16" font-weight="700" fill="${isActive?'white':'var(--text)'}">"${e.val}"</text>`;
    if (i < cache.length-1) {
      const arrowX = x+cellW+gap/2;
      svg += `<text x="${arrowX}" y="${offY+cellH/2+5}" text-anchor="middle" font-size="14" fill="var(--muted)">↔</text>`;
    }
  });
  if (evicted) svg += `<text x="${offX}" y="${offY+cellH+28}" font-size="12" fill="var(--accent2)">⚠ Evicted key=${evicted} (was LRU)</text>`;
  svg += '</svg>';
  document.getElementById('viz-array').innerHTML = svg;
}

// ── Bubble Sort (existing) ────────────────
function buildBubbleSortSteps(arr) {
  const a = [...arr];
  const steps = [{ arr: [...a], active: [], sorted: new Set(), status: 'Starting bubble sort...' }];
  const n = a.length;
  for (let i = 0; i < n; i++) {
    let swapped = false;
    for (let j = 0; j < n - i - 1; j++) {
      steps.push({ arr: [...a], active: [j, j+1], sorted: new Set([...Array(i)].map((_,x)=>n-1-x)), status: `Comparing ${a[j]} and ${a[j+1]}` });
      if (a[j] > a[j+1]) {
        [a[j], a[j+1]] = [a[j+1], a[j]];
        steps.push({ arr: [...a], active: [j, j+1], sorted: new Set([...Array(i)].map((_,x)=>n-1-x)), status: `Swapped ${a[j+1]} and ${a[j]}` });
        swapped = true;
      }
    }
    const sortedSet = new Set([...Array(i+1)].map((_,x)=>n-1-x));
    steps.push({ arr: [...a], active: [], sorted: sortedSet, status: `Pass ${i+1} complete` });
    if (!swapped) break;
  }
  steps.push({ arr: [...a], active: [], sorted: new Set([...Array(n)].map((_,x)=>x)), status: '✓ Array sorted!' });
  return steps;
}

function buildBinarySearchSteps(arr, target) {
  const steps = [];
  let left = 0, right = arr.length - 1;
  steps.push({ left, right, mid: -1, found: -1, status: `Searching for ${target}...` });
  while (left <= right) {
    const mid = Math.floor((left + right) / 2);
    steps.push({ left, right, mid, found: -1, status: `mid=${mid}, arr[mid]=${arr[mid]}, target=${target}` });
    if (arr[mid] === target) {
      steps.push({ left, right, mid, found: mid, status: `✓ Found ${target} at index ${mid}!` });
      return steps;
    } else if (arr[mid] < target) {
      steps.push({ left: mid+1, right, mid, found: -1, status: `${arr[mid]} < ${target}, search right half` });
      left = mid + 1;
    } else {
      steps.push({ left, right: mid-1, mid, found: -1, status: `${arr[mid]} > ${target}, search left half` });
      right = mid - 1;
    }
  }
  steps.push({ left, right, mid: -1, found: -1, status: `Target ${target} not found` });
  return steps;
}

function renderBars(arr, active, sorted) {
  const max = Math.max(...arr);
  document.getElementById('viz-array').innerHTML = arr.map((v, i) => `
    <div class="viz-bar ${active.includes(i) ? 'comparing' : sorted.has(i) ? 'sorted' : ''}">
      <div class="bar-body" style="height:${Math.max(20, (v/max)*100)}px"></div>
      <div class="bar-label">${v}</div>
    </div>
  `).join('');
}

function renderBinaryBars(arr, mid, left, right, found) {
  const max = Math.max(...arr);
  document.getElementById('viz-array').innerHTML = arr.map((v, i) => {
    let cls = '';
    if (found === i) cls = 'found';
    else if (mid === i) cls = 'active';
    else if (i < left || i > right) cls = 'sorted';
    return `<div class="viz-bar ${cls}">
      <div class="bar-body" style="height:${Math.max(20, (v/max)*100)}px"></div>
      <div class="bar-label">${v}</div>
    </div>`;
  }).join('');
}

// ── Reset / Run dispatcher ───────────────
function resetViz() {
  if (vizTimer) { clearTimeout(vizTimer); vizTimer = null; }
  vizStepIdx = 0;
  const btn = document.getElementById('viz-run-btn');
  if (btn) btn.textContent = '▶ Run';
  if (!currentAlgo) return;
  const v = currentAlgo.viz;
  if (v === 'bubble-sort') {
    vizData = [38, 27, 43, 3, 9, 82, 10];
    vizSteps = buildBubbleSortSteps(vizData);
    renderBars(vizData, [], new Set());
  } else if (v === 'binary-search') {
    vizData = [2, 5, 8, 12, 16, 23, 38, 56];
    vizSteps = buildBinarySearchSteps(vizData, 23);
    renderBinaryBars(vizData, -1, 0, vizData.length-1, -1);
  } else if (v === 'graph-bfs') {
    vizSteps = buildBFSSteps();
    document.getElementById('viz-array').innerHTML = buildGraphSVG(GRAPH_NODES, GRAPH_EDGES, [], '', []);
  } else if (v === 'graph-dfs') {
    vizSteps = buildDFSSteps();
    document.getElementById('viz-array').innerHTML = buildGraphSVG(GRAPH_NODES, GRAPH_EDGES, [], '', []);
  } else if (v === 'graph-dijkstra') {
    vizSteps = buildDijkstraSteps();
    const d0 = {}; Object.keys(DIJKSTRA_NODES).forEach(k=>d0[k]=Infinity); d0['S']=0;
    document.getElementById('viz-array').innerHTML = buildGraphSVG(DIJKSTRA_NODES, DIJKSTRA_EDGES, [], '', [], true, d0);
  } else if (v === 'fibonacci-dp') {
    vizSteps = buildFibSteps(10);
    renderFibViz(vizSteps[0]);
  } else if (v === 'knapsack') {
    vizSteps = buildKnapsackSteps();
    renderKnapsackViz(vizSteps[0]);
  } else if (v === 'bst') {
    vizSteps = buildBSTSteps();
    renderBSTViz(vizSteps[0]);
  } else if (v === 'trie') {
    vizSteps = buildTrieSteps();
    renderTrieViz(vizSteps[0]);
  } else if (v === 'activity-selection') {
    vizSteps = buildActivitySteps();
    renderActivityViz(vizSteps[0]);
  } else if (v === 'hash-table') {
    vizSteps = buildHashTableSteps();
    renderHashTableViz(vizSteps[0]);
  } else if (v === 'astar') {
    vizSteps = buildAStarSteps();
    renderAStarViz(vizSteps[0]);
  } else if (v === 'lru-cache') {
    vizSteps = buildLRUSteps();
    renderLRUViz(vizSteps[0]);
  }
  const statusEl = document.getElementById('viz-status');
  if (statusEl) statusEl.textContent = vizSteps[0]?.status || 'Press Run to see the algorithm in action';
}

function renderStep(s) {
  const v = currentAlgo.viz;
  if (v === 'bubble-sort') renderBars(s.arr, s.active || [], s.sorted || new Set());
  else if (v === 'binary-search') renderBinaryBars(vizData, s.mid, s.left, s.right, s.found);
  else if (v === 'graph-bfs') document.getElementById('viz-array').innerHTML = buildGraphSVG(GRAPH_NODES, GRAPH_EDGES, s.visited, s.current, s.queue);
  else if (v === 'graph-dfs') document.getElementById('viz-array').innerHTML = buildGraphSVG(GRAPH_NODES, GRAPH_EDGES, s.visited, s.current, s.stack);
  else if (v === 'graph-dijkstra') document.getElementById('viz-array').innerHTML = buildGraphSVG(DIJKSTRA_NODES, DIJKSTRA_EDGES, s.visited, s.current, [], true, s.dist);
  else if (v === 'fibonacci-dp') renderFibViz(s);
  else if (v === 'knapsack') renderKnapsackViz(s);
  else if (v === 'bst') renderBSTViz(s);
  else if (v === 'trie') renderTrieViz(s);
  else if (v === 'activity-selection') renderActivityViz(s);
  else if (v === 'hash-table') renderHashTableViz(s);
  else if (v === 'astar') renderAStarViz(s);
  else if (v === 'lru-cache') renderLRUViz(s);
}

function runViz() {
  if (!currentAlgo || !vizSteps.length) return;
  const btn = document.getElementById('viz-run-btn');
  if (vizStepIdx >= vizSteps.length) { resetViz(); return; }
  btn.textContent = '⏸ Running...';
  function step() {
    if (vizStepIdx >= vizSteps.length) { btn.textContent = '↺ Replay'; return; }
    const s = vizSteps[vizStepIdx++];
    document.getElementById('viz-status').textContent = s.status;
    renderStep(s);
    const delay = ['knapsack','fibonacci-dp'].includes(currentAlgo.viz) ? 400 : 700;
    vizTimer = setTimeout(step, delay);
  }
  step();
}

<script>
  // Theme Toggle Logic
  function setTheme(theme) {
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-toggle').textContent = '☀️'; // Show sun to toggle to light
    } else {
      document.documentElement.removeAttribute('data-theme');
      document.getElementById('theme-toggle').textContent = '🌙'; // Show moon to toggle to dark
    }
    localStorage.setItem('algologic-theme', theme);
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    setTheme(isDark ? 'light' : 'dark');
  }

  // Initialize Theme
  const savedTheme = localStorage.getItem('algologic-theme');
  if (savedTheme) {
    setTheme(savedTheme);
  } else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(prefersDark ? 'dark' : 'light');
  }
</script>
